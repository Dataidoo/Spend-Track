<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#232629"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>Spending Tracker</title>
<link rel="manifest" href="manifest.json"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Hammersmith+One&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #232629;
    --card:     #2a2d31;
    --raise:    #2f3337;
    --blue:     #0090FF;
    --blue2:    #00A2FF;
    --white:    #FFFFFF;
    --steel:    #7D858D;
    --dim:      #3a3f45;
    --shadow-out: 4px 4px 8px #1a1c1e, -4px -4px 8px #2e3236;
    --shadow-in:  inset 3px 3px 6px #1a1c1e, inset -3px -3px 6px #2e3236;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--white);
    font-family: 'Hammersmith One', sans-serif;
    overflow-x: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
    min-height: 100dvh;
    padding: 12px 12px 24px;
    gap: 20px;
  }

  /* ── HEADER ─────────────────────────────────────── */
  header {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    padding: 6px 0 2px;
  }
  .date-display {
    font-size: .75rem;
    color: var(--steel);
    letter-spacing: .05em;
  }

  /* ── COIN LOGO ───────────────────────────────────── */
  .coin-wrap { perspective: 400px; }
  .coin {
    width: 92px;
    height: 92px;
    transform-style: preserve-3d;
    animation: coinflip 1.4s ease-out forwards;
    animation-delay: 0.1s;
  }
  .coin img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    border-radius: 50%;
  }
  @keyframes coinflip {
    0%   { transform: rotateY(0deg); }
    30%  { transform: rotateY(540deg)  rotateZ(6deg); }
    65%  { transform: rotateY(960deg)  rotateZ(-3deg); }
    85%  { transform: rotateY(1080deg) rotateZ(1deg); }
    100% { transform: rotateY(var(--land, 1080deg)) rotateZ(0deg); }
  }

  /* ── SEND EMAIL BUTTON ───────────────────────────── */
  .send-btn {
    background: var(--card);
    border: 1px solid var(--blue);
    border-radius: 12px;
    box-shadow: var(--shadow-out);
    color: var(--blue);
    font-family: 'Hammersmith One', sans-serif;
    font-size: .85rem;
    letter-spacing: .14em;
    padding: 12px;
    cursor: pointer;
    text-transform: uppercase;
    transition: background .15s, color .15s, box-shadow .15s;
    -webkit-tap-highlight-color: transparent;
  }
  .send-btn:active { background: var(--blue); color: var(--white); box-shadow: var(--shadow-in); }
  .send-btn:disabled { opacity: .4; pointer-events: none; }

  /* ── SECTION LABELS ─────────────────────────────── */
  .section-label {
    font-size: .65rem;
    letter-spacing: .18em;
    color: var(--steel);
    text-transform: uppercase;
    padding: 0 2px;
  }

  /* ── METER ROW (4 icons) ────────────────────────── */
  .meter-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
  }

  .meter-card {
    background: var(--card);
    border-radius: 16px;
    box-shadow: var(--shadow-out);
    padding: 12px 8px 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .meter-label {
    font-size: .6rem;
    letter-spacing: .1em;
    color: var(--steel);
    text-transform: uppercase;
  }

  /* Icon meter — clip-path reveals color from bottom, dark version always behind */
  .icon-meter-wrap {
    position: relative;
    width: 48px;
    height: 48px;
  }

  .icon-base {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    /* tinted dark — the "empty" state */
    filter: brightness(0) saturate(100%) invert(30%) sepia(10%) saturate(300%) hue-rotate(180deg);
    opacity: .35;
  }

  .icon-fill {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    /* blue-tinted fill */
    filter: brightness(0) saturate(100%) invert(45%) sepia(90%) saturate(600%) hue-rotate(185deg) brightness(1.2);
    /* clip from top: 0% = full icon visible, 100% = icon empty */
    clip-path: inset(0% 0% 0% 0%); /* updated by JS */
    transition: clip-path .4s ease;
  }

  .meter-bar-wrap {
    width: 100%;
    height: 5px;
    background: var(--dim);
    border-radius: 3px;
    box-shadow: var(--shadow-in);
    overflow: hidden;
  }
  .meter-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--blue), var(--blue2));
    border-radius: 3px;
    transition: width .4s ease;
  }

  .meter-amount {
    font-size: .7rem;
    color: var(--white);
    letter-spacing: .04em;
  }
  .meter-amount.low  { color: #FF6B6B; }
  .meter-amount.mid  { color: #FFB347; }

  /* ── PAID ROW (5 icons) ─────────────────────────── */
  .paid-row {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
  }

  .paid-card {
    background: var(--card);
    border-radius: 14px;
    box-shadow: var(--shadow-out);
    padding: 10px 6px 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    transition: box-shadow .2s;
    -webkit-tap-highlight-color: transparent;
  }
  .paid-card:active {
    box-shadow: var(--shadow-in);
  }
  .paid-card.paid {
    box-shadow: 0 0 0 1.5px var(--blue), var(--shadow-out);
  }

  .paid-icon-wrap {
    width: 36px;
    height: 36px;
    position: relative;
  }
  .paid-icon {
    width: 100%;
    height: 100%;
    transition: filter .25s;
  }
  .paid-card:not(.paid) .paid-icon {
    filter: brightness(0) saturate(100%) invert(30%) sepia(10%) saturate(300%) hue-rotate(180deg);
    opacity: .3;
  }
  .paid-card.paid .paid-icon {
    filter: brightness(0) saturate(100%) invert(45%) sepia(90%) saturate(600%) hue-rotate(185deg) brightness(1.2);
    opacity: 1;
  }

  .paid-label {
    font-size: .55rem;
    letter-spacing: .08em;
    color: var(--steel);
    text-transform: uppercase;
  }
  .paid-card.paid .paid-label { color: var(--blue); }

  /* ── SAVINGS ────────────────────────────────────── */
  .savings-card {
    background: var(--card);
    border-radius: 14px;
    box-shadow: var(--shadow-out);
    padding: 12px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .savings-label {
    font-size: .75rem;
    letter-spacing: .14em;
    color: var(--steel);
    text-transform: uppercase;
  }
  .savings-amount {
    font-size: 1.1rem;
    color: var(--blue2);
    letter-spacing: .06em;
  }

  /* ── ENTRY FORM ─────────────────────────────────── */
  .entry-card {
    background: var(--card);
    border-radius: 16px;
    box-shadow: var(--shadow-out);
    padding: 14px 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    flex: 1;
  }

  .input-row {
    display: grid;
    grid-template-columns: 110px 1fr;
    gap: 10px;
  }

  .neo-input {
    background: var(--bg);
    border: none;
    border-radius: 10px;
    box-shadow: var(--shadow-in);
    color: var(--white);
    font-family: 'Hammersmith One', sans-serif;
    font-size: .9rem;
    padding: 10px 12px;
    outline: none;
    width: 100%;
    -webkit-appearance: none;
  }
  .neo-input::placeholder { color: var(--steel); font-size: .8rem; }
  .neo-input:focus { box-shadow: var(--shadow-in), 0 0 0 1.5px var(--blue); }

  /* ── CATEGORY BUTTONS ───────────────────────────── */
  .cat-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 7px;
  }

  .cat-btn {
    background: var(--bg);
    border: none;
    border-radius: 10px;
    box-shadow: var(--shadow-out);
    color: var(--steel);
    font-family: 'Hammersmith One', sans-serif;
    font-size: .52rem;
    letter-spacing: .04em;
    padding: 8px 3px;
    cursor: pointer;
    transition: box-shadow .15s, color .15s;
    -webkit-tap-highlight-color: transparent;
    text-transform: uppercase;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .cat-btn-icon {
    width: 22px;
    height: 22px;
    object-fit: contain;
    opacity: .55;
    transition: opacity .15s, filter .15s;
    filter: brightness(0) saturate(100%) invert(55%) sepia(8%) saturate(400%) hue-rotate(165deg);
  }
  .cat-btn:active, .cat-btn.selected {
    box-shadow: var(--shadow-in);
    color: var(--blue);
  }
  .cat-btn.selected .cat-btn-icon {
    opacity: 1;
    filter: brightness(0) saturate(100%) invert(45%) sepia(90%) saturate(600%) hue-rotate(185deg) brightness(1.2);
  }

  /* ── SUBMIT ─────────────────────────────────────── */
  .submit-btn {
    background: linear-gradient(135deg, var(--blue), var(--blue2));
    border: none;
    border-radius: 12px;
    box-shadow: 0 4px 16px rgba(0,144,255,.35);
    color: var(--white);
    font-family: 'Hammersmith One', sans-serif;
    font-size: .95rem;
    letter-spacing: .14em;
    padding: 14px;
    cursor: pointer;
    text-transform: uppercase;
    transition: opacity .15s, box-shadow .15s;
    -webkit-tap-highlight-color: transparent;
  }
  .submit-btn:active { opacity: .85; box-shadow: none; }

  /* ── TOAST ──────────────────────────────────────── */
  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--raise);
    border: 1px solid var(--blue);
    border-radius: 10px;
    color: var(--white);
    font-size: .8rem;
    letter-spacing: .06em;
    padding: 10px 20px;
    opacity: 0;
    transition: opacity .25s, transform .25s;
    pointer-events: none;
    white-space: nowrap;
    z-index: 999;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="coin-wrap">
    <div class="coin" id="coinLogo">
      <img src="assets/coin-logo.png" alt="Spending Tracker"/>
    </div>
  </div>
  <span class="date-display" id="dateDisplay"></span>
</header>

<!-- METER ROW -->
<div class="meter-row" id="meterRow"></div>

<!-- PAID ROW -->
<div class="paid-row" id="paidRow"></div>

<!-- SAVINGS -->
<div class="savings-card">
  <span class="savings-label">Save</span>
  <span class="savings-amount" id="savingsDisplay">$0.00</span>
</div>

<!-- ENTRY FORM -->
<div class="entry-card">
  <button class="submit-btn" id="submitBtn">Add Entry</button>
  <div class="input-row">
    <input class="neo-input" type="text" id="amountInput" placeholder="$ Amount" inputmode="decimal" pattern="[0-9]*\.?[0-9]*"/>
    <input class="neo-input" type="text"   id="descInput"   placeholder="Description"/>
  </div>
  <div class="cat-grid" id="catGrid">
    <!-- built by JS -->
  </div>
</div>

<!-- SEND EMAIL -->
<button class="send-btn" id="sendBtn">Submit <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-3px;margin-left:6px;"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3.5 7l8.5 6 8.5-6"/></svg></button>

<div class="toast" id="toast"></div>

<script>
// ── DATA ─────────────────────────────────────────────────────────
// Default budget targets. These can be overridden at load time by a
// budget.json file synced into this folder from the budget sheet.
let BUDGETS = {
  'Rent':   975,
  'Kids':   500,
  'Phone':   80,
  'Food':   400,
  'Subs':    60,
  'Vice':   240,
  'Travel':  50,
  'Xtra':   200,
  'Shop':   300,
  'Save':   null,
};

// Categories with fill-up meters (top 4) — fill rises as you spend
const METER_CATS = ['Vice','Food','Xtra','Shop'];
// Categories as bill lights (5) — light turns on when budget reached
const PAID_CATS  = ['Rent','Kids','Phone','Travel','Subs'];
// All selectable in entry form (Shop at the bottom, Save for the savings card)
const ALL_CATS   = ['Rent','Kids','Phone','Food','Vice','Subs','Travel','Xtra','Shop','Save'];

// Icon paths — relative to where the html lives in the repo
const ICON_PATH = 'assets/icons/';
const iconFile  = cat => `${ICON_PATH}${cat.replace(' ','_').replace('$','dollar')}.png`;

// State
let entries  = JSON.parse(localStorage.getItem('spending_entries') || '[]');
let paid     = JSON.parse(localStorage.getItem('spending_paid')    || '{}');
let selected = null;

// ── HELPERS ──────────────────────────────────────────────────────
function spentOn(cat) {
  return entries
    .filter(e => e.cat === cat)
    .reduce((s, e) => s + e.amt, 0);
}

function fmtMoney(n) {
  return '$' + Math.abs(n).toFixed(2);
}

function save() {
  localStorage.setItem('spending_entries', JSON.stringify(entries));
  localStorage.setItem('spending_paid',    JSON.stringify(paid));
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ── DATE ─────────────────────────────────────────────────────────
function updateDate() {
  const now = new Date();
  document.getElementById('dateDisplay').textContent =
    now.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' }).toUpperCase();
}

// ── METERS ───────────────────────────────────────────────────────
function buildMeters() {
  const row = document.getElementById('meterRow');
  row.innerHTML = '';
  METER_CATS.forEach(cat => {
    const budget  = BUDGETS[cat];
    const spent   = spentOn(cat);
    // fill rises as you spend: 0 spent = empty, at/over budget = full
    const pct     = budget != null ? Math.max(0, Math.min(1, spent / budget)) : (spent > 0 ? 1 : 0);
    // fill from bottom up: empty = inset(100% from top), full = inset(0%)
    const clipTop = Math.round((1 - pct) * 100);

    const amtClass = budget == null ? '' : pct >= 1 ? 'low' : pct > .8 ? 'mid' : '';
    const amtText  = fmtMoney(spent);

    row.insertAdjacentHTML('beforeend', `
      <div class="meter-card">
        <span class="meter-label">${cat}</span>
        <div class="icon-meter-wrap">
          <img class="icon-base" src="${iconFile(cat)}" alt="${cat}" onerror="this.style.opacity=0"/>
          <img class="icon-fill" src="${iconFile(cat)}" alt=""
               style="clip-path:inset(${clipTop}% 0% 0% 0%)"
               onerror="this.style.opacity=0"/>
        </div>
        <div class="meter-bar-wrap">
          <div class="meter-bar-fill" style="width:${Math.round(pct*100)}%"></div>
        </div>
        <span class="meter-amount ${amtClass}">${amtText}</span>
      </div>
    `);
  });
}

// ── BILL LIGHTS (automatic) ──────────────────────────────────────
// A bill lights up on its own once logged spending on that category
// reaches its budgeted amount. Not clickable — read-only status.
function buildPaid() {
  const row = document.getElementById('paidRow');
  row.innerHTML = '';
  PAID_CATS.forEach(cat => {
    const budget = BUDGETS[cat];
    const spent  = spentOn(cat);
    const isPaid = budget != null && spent >= budget;
    const card = document.createElement('div');
    card.className = 'paid-card' + (isPaid ? ' paid' : '');
    card.innerHTML = `
      <div class="paid-icon-wrap">
        <img class="paid-icon" src="${iconFile(cat)}" alt="${cat}" onerror="this.style.opacity=0"/>
      </div>
      <span class="paid-label">${cat}</span>
    `;
    row.appendChild(card);
  });
}

// ── SAVINGS ──────────────────────────────────────────────────────
function updateSavings() {
  const spent = spentOn('Save');
  document.getElementById('savingsDisplay').textContent =
    spent > 0 ? fmtMoney(spent) : '$0.00';
}

// ── CATEGORY BUTTONS ─────────────────────────────────────────────
function buildCatGrid() {
  const grid = document.getElementById('catGrid');
  grid.innerHTML = '';
  ALL_CATS.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn' + (selected === cat ? ' selected' : '');
    btn.innerHTML = `
      <img class="cat-btn-icon" src="${iconFile(cat)}" alt="${cat}" onerror="this.style.display='none'"/>
      <span>${cat}</span>
    `;
    btn.addEventListener('click', () => {
      selected = (selected === cat) ? null : cat;
      buildCatGrid();
    });
    grid.appendChild(btn);
  });
}

// ── SUBMIT ───────────────────────────────────────────────────────
document.getElementById('submitBtn').addEventListener('click', () => {
  const amtRaw = parseFloat(document.getElementById('amountInput').value);
  const desc   = document.getElementById('descInput').value.trim();

  if (!selected)        { showToast('Select a category'); return; }
  if (isNaN(amtRaw) || amtRaw <= 0) { showToast('Enter a valid amount'); return; }

  const entry = {
    date: new Date().toLocaleDateString('en-US'),
    cat:  selected,
    desc: desc || '',
    amt:  amtRaw,
  };

  entries.push(entry);
  save();

  document.getElementById('amountInput').value = '';
  document.getElementById('descInput').value   = '';
  selected = null;

  buildMeters();
  buildPaid();
  buildCatGrid();
  updateSavings();
  showToast(`Added ${fmtMoney(amtRaw)} → ${entry.cat}`);
});

// ── INIT ─────────────────────────────────────────────────────────
// Try to load budget targets from budget.json (synced in from the budget
// sheet). If it's there, it overrides the defaults so the phone stays
// current with the sheet. If not, the built-in defaults above are used.
function buildAll() {
  updateDate();
  buildMeters();
  buildPaid();
  updateSavings();
  buildCatGrid();
}

fetch('budget.json', { cache: 'no-store' })
  .then(r => r.ok ? r.json() : null)
  .then(data => {
    if (data && typeof data === 'object') {
      // merge: any amount present in the file overrides the default
      Object.keys(data).forEach(k => { BUDGETS[k] = data[k]; });
    }
  })
  .catch(() => {})        // no file / offline = keep defaults
  .then(() => fetch('entries.json', { cache: 'no-store' }))
  .then(r => r && r.ok ? r.json() : null)
  .then(data => {
    // entries.json format:  { "synced_at": "2026-06-20T22:00:00Z", "entries": [...], "paid": {...} }
    // Only imports if synced_at is NEWER than the last imported timestamp,
    // so new entries added on-phone after the sync don't get wiped on the next page load.
    if (!data || !data.synced_at || !Array.isArray(data.entries)) return;
    const lastImported = localStorage.getItem('spending_last_import') || '';
    if (data.synced_at <= lastImported) return;       // already have this version (or newer)
    entries = data.entries;
    if (data.paid && typeof data.paid === 'object') paid = data.paid;
    localStorage.setItem('spending_last_import', data.synced_at);
    save();
  })
  .catch(() => {})
  .finally(buildAll);

// random coin landing angle (multiples of 180 so it lands face-up or face-down randomly)
const landAngles = [1080, 1260, 1440, 900, 720];
function flipCoin() {
  const coin = document.getElementById('coinLogo');
  const pick = landAngles[Math.floor(Math.random() * landAngles.length)];
  coin.style.setProperty('--land', pick + 'deg');
  // restart the animation
  coin.style.animation = 'none';
  void coin.offsetWidth;          // force reflow so the animation can replay
  coin.style.animation = '';
}
// initial flip on open
flipCoin();
// flip again whenever tapped
document.getElementById('coinLogo').addEventListener('click', flipCoin);
document.querySelector('.coin-wrap').style.cursor = 'pointer';

// ── EMAIL SEND ────────────────────────────────────────────────────
document.getElementById('sendBtn').addEventListener('click', () => {
  if (!entries.length) { showToast('No entries to send'); return; }

  const today = new Date().toLocaleDateString('en-US', {
    year: 'numeric', month: '2-digit', day: '2-digit'
  });

  const lines = entries.map(e =>
    `${e.date} | ${e.cat} | ${e.amt.toFixed(2)} | ${e.desc}`
  ).join('\n');

  const paidList = Object.keys(paid).filter(k => paid[k]).join(', ') || 'None';

  const body = encodeURIComponent(
    `SPENDING ENTRY — ${today}\n` +
    `${'─'.repeat(32)}\n` +
    lines + '\n' +
    `${'─'.repeat(32)}\n` +
    `BILLS PAID: ${paidList}\n`
  );

  const subject = encodeURIComponent(`[SPENDING] ${today}`);
  window.location.href = `mailto:data.im.storing@gmail.com?subject=${subject}&body=${body}`;
});

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js');
  });
}
</script>
</body>
</html>
